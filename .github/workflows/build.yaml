name: MicroPython for ESP32-S3-WROOM-1 N16R8 Octal SPIRAM only and MicroPython ESP32-S3-WROOM-1 N16R8 Octal SPIRAM + SmartConfig Module

permissions:
  contents: write

on:
  push:
    tags:
     - 'v*'
  schedule:
     - cron: '0 0 1 * *'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone repo
      uses: actions/checkout@v7

    - name: Clone repo smartconfig by Walkline80
      run :  git clone https://gitee.com/walkline/micropython-smartconfig-cmodule.git smartconfig
      
    - name: Clone Micropython
      run: git clone --depth 1--recursive https://github.com/micropython/micropython.git

    #- id: idf_ver
    #  name: Read ESP-IDF and Python version from tools/ci.sh
    #  run: |
    #    cd "$GITHUB_WORKSPACE/micropython"
    #    source $GITHUB_WORKSPACE/micropython/tools/ci.sh
    #    echo "IDF_VER=${IDF_VER}" | tee -a "$GITHUB_OUTPUT"
    #    echo "PYTHON_VER=${PYTHON_VER}" | tee -a "$GITHUB_OUTPUT"

    - name: Install yq
      run: sudo apt-get update && sudo apt-get install -y yq

    - id: idf_ver
      name: Extract IDF version from MicroPython workflow
      run: |
        cd micropython
        IDF_VER=$(yq '.env.IDF_NEWEST_VER' .github/workflows/ports_esp32.yml | tr -d '"')
        echo "IDF_VER=$IDF_VER" >> $GITHUB_OUTPUT
    
    #- name: Setup Python
    #  uses: actions/setup-python@v6.2.0
      #with:
      #  python-version: ${{ steps.idf_ver.outputs.PYTHON_VER }}
    
    - name: Install dependencies
      run: |
       sudo apt update
       sudo apt-get install -y git wget cmake ninja-build
       pip3 install --upgrade pip
  
    - name: Setup ESP-IDF
      run: |
        git clone --depth 1 --branch ${{ steps.idf_ver.outputs.IDF_VER }} https://github.com/espressif/esp-idf.git
        git -C esp-idf submodule update --init --recursive --depth=1     
        echo "Instalando entorno virtual de ESP-IDF..."
        ./esp-idf/install.sh
   
    - name: Set up environment
      run: |
        source esp-idf/export.sh
        echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV
        idf.py --version

    - name: Get MicroPython Version from mpconfig.h
      run: |
        cd micropython/
        MAJOR=$(grep -oP '(?<=#define MICROPY_VERSION_MAJOR )[0-9]+' py/mpconfig.h)
        MINOR=$(grep -oP '(?<=#define MICROPY_VERSION_MINOR )[0-9]+' py/mpconfig.h)
        MICRO=$(grep -oP '(?<=#define MICROPY_VERSION_MICRO )[0-9]+' py/mpconfig.h)
        PRERELEASE=$(grep -oP '(?<=#define MICROPY_VERSION_PRERELEASE )[0-9]+' py/mpconfig.h)

        if [ "$PRERELEASE" -eq 1 ]; then
          MPY_VERSION="$MAJOR.$MINOR.$MICRO-preview"
        else
          MPY_VERSION="$MAJOR.$MINOR.$MICRO"
        fi

        echo "MPY_VERSION=$MPY_VERSION" >> $GITHUB_ENV

    - name: Create git tag with version (if not exists)
      run: |
        cd micropython
        TAG="v${{ env.MPY_VERSION }}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "El tag $TAG ya existe, omitiendo..."
        else
          git tag "$TAG"
          echo "Tag creado: $TAG"
        fi
      
    - name: Copy board configuration
      if: false
      run: |
        cp -r ESP32_GENERIC_S3_N16R8 micropython/ports/esp32/boards/

    - name: Copiar tabla de particiones personalizada
      if: false
      run: |
        cp "$GITHUB_WORKSPACE/ESP32_GENERIC_S3_N16R8/partitions-16MiB.csv" "$GITHUB_WORKSPACE/micropython/ports/esp32/partitions-16MiB.csv"

    - name: Compile MicroPython with SmartConfig
      run: |
        source esp-idf/export.sh
        cd ${{ github.workspace }}/micropython
        make -j$(nproc) -C mpy-cross
        make -j$(nproc) -C ports/esp32 submodules
        make -j$(nproc) -C ports/esp32 BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT USER_C_MODULES="$GITHUB_WORKSPACE/smartconfig/cmodules/micropython.cmake"
    
    - name: Move binaries MicroPython + SmartConfig
      run: |
        mkdir -p ./artifacts
        BUILD="micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT"
        cp $BUILD/firmware.bin artifacts/firmware_smart.bin
        cp $BUILD/micropython.bin ./artifacts/micropython_smart.bin || true
        cp $BUILD/bootloader/bootloader.bin ./artifacts/bootloader_smart.bin || true
        cp $BUILD/partition_table/partition-table.bin ./artifacts/partition-table_smart.bin || true

    - name: Compile MicroPython only
      run: |
        source esp-idf/export.sh
        cd ${{ github.workspace }}/micropython
        make -j$(nproc) -C mpy-cross
        make -j$(nproc) -C ports/esp32 submodules
        make -j$(nproc) -C ports/esp32 BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT

    - name: Move binaries MicroPython
      run: |
        BUILD="micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT"
        cp $BUILD/firmware.bin artifacts/
        cp $BUILD/micropython.bin ./artifacts/micropython.bin || true
        cp $BUILD/bootloader/bootloader.bin ./artifacts/bootloader.bin || true
        cp $BUILD/partition_table/partition-table.bin ./artifacts/partition-table.bin || true

    - name: Generate Tag
      id: tag
      run: echo "TAG_NAME=release-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

    - name: Verificar existencia de todos los binarios
      run: |
        REQUIRED_FILES=(
          ./artifacts/firmware.bin
          ./artifacts/micropython.bin
          ./artifacts/bootloader.bin
          ./artifacts/partition-table.bin
          ./artifacts/firmware_smart.bin
          ./artifacts/micropython_smart.bin
          ./artifacts/bootloader_smart.bin
          ./artifacts/partition-table_smart.bin
        )
    
        for FILE in "${REQUIRED_FILES[@]}"; do
          if [ ! -f "$FILE" ]; then
            echo "Falta el archivo: $FILE"
            exit 1
          fi
        done
            
    - name: GH Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: "MicroPython ESP32-S3-WROOM-1 N16R8 Octal SPIRAM and MicroPython ESP32-S3-WROOM-1 N16R8 Octal SPIRAM + Smartconfig Release version ${{ env.MPY_VERSION }} (Build ${{ env.TAG_NAME }})"
        body: |
          Automated release for MicroPython with SmartConfig.
          - What we get here:
             - ```firmware.bin, micropython.bin, bootloader.bin and partition-table.bin are MicroPython itslef by default, without SmartConfig module.```
             - ```firmware_smart.bin,micropython_smart.bin, bootloader_smart.bin and partition-table_smart.bin are MicroPython + SmartConfig module.```
            `firmware.bin` has the 3 binaries in just one file
            
          # Instructions
          
          You need to have some dependencies pre-instaled in your OS:
          - Python 3
          - Pip
          - Python VENV
          
          ## Windows or Linux:
          Create Virtual Environment
          
          ```python
          python -m venv esp-env
          ```
          
          ### On Windows activate Virtual Environment this way:
          
          ```python
          .\esp-env\Scripts\activate
          ```
          
          ### On Linux activate Virtual Environment this way:
          
          ```bash
          source esp-env/bin/activate
          ```
          
          ### On Windows or Linux install esptool:
          
          ```python
          pip install esptool
          ```
          
          ### Put ESP32-S3-WROOM-1 N16R8 in BOOTLOADER MODE:
          - With USB cable on USB, press BOOT button then RST button, release RST, then release BOOT button. Or unplug, press BOOT button meanwhile you plug in the usb cable to PC or SBC like a Raspberry Pi.
          - Alternative: Use Thonny IDE, plug your ESP32-S3-WROOM-1 N16R8, on Thonny Shell type:
          
          ```python
          from machine import bootloader
          ```
          
          Press ``Enter`` then type:
          
          ```python
          bootloader()
          ```
          
          Press ``Enter`` then just cose Thonny and go to Terminal with Virtual Environment activate.
          
          ### Erase Flash:
          
          ```python
          python -m esptool --chip esp32s3 erase-flash
          ```
          
          ### Then Flash:
          - Put 3 binaries in the same folder you are executing the steps, example Downloads folder, you need to be in that folder where are the binaries.
          
          ```python
          python -m esptool write-flash 0x0 bootloader.bin 0x8000 partition-table.bin 0x10000 micropython.bin
          ```

          - Or just `firmware.bin`:

          ```python
          python -m esptool write-flash 0x0 firmware.bin
          ```
          
          #### Step for MicroPython+SmartConfig:
          - Put 3 binaries in the same folder you are executing the steps, example Downloads folder, you need to be in that folder where are the binaries.
          
          ```python
          python -m esptool write-flash 0x0 bootloader_smart.bin 0x8000 partition-table_smart.bin 0x10000 micropython_smart.bin
          ```

          - Or just `firmware_smart.bin`:

          ```python
          python -m esptool write-flash 0x0 firmware_smart.bin
          ```
          
          ### You can check from MicroPython Shell on Thonny with:
          
          ```python
          help('modules')
          ```
          
          The modules in MicroPython.

          ### NOTE IN WINDOWS:
          - If you get a PowerShell Scripts Policy Execution Exception that don't let you activate the Virtual Environment:
          
          ```powershell
          .\esp-env\Scripts\activate
          ```
          
          - Then open a Terminal like Administrator and type:
          
          ```powershell
          Set-ExecutionPolicy Unrestricted
          ```
          
          - Close the Terminal now you can activate the Python Virtual Enmvironment
          
          - [ESPWebTool Flasher](https://esptool.spacehuhn.com/):
          
          ```bash
          - Put in Bootloader. Choose the USB/JTAG port.
          - ERASE button first.
          - Let it only:
            - 0x0 bootloader.bin
            - 0x8000 partition-table.bin
            - 0x10000 micropython.bin
            - Press PROGRAM after done, press RST button or Unplug the Board.
          ```
          
        draft: false
        prerelease: false
        files: ./artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
